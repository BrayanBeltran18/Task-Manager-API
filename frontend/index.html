<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .completed-strike {
            text-decoration: line-through;
            color: #9ca3af;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 text-slate-800">

    <div class="w-full max-w-xl flex flex-col items-center mb-6 fade-in">
        <!-- Creative Floating Header -->
        <div
            class="inline-flex items-center justify-center p-3 rounded-2xl bg-white shadow-xl shadow-blue-500/10 mb-2 ring-1 ring-slate-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
            </svg>
        </div>
        <h1
            class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500 drop-shadow-sm text-center">
            Task Manager
        </h1>
        <p class="text-slate-500 text-sm mt-1 font-medium text-center">Para que sepas todo lo que tienes pendiente.</p>
    </div>

    <main class="w-full max-w-xl bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden fade-in">

        <!-- Input Section -->
        <div class="p-8 border-b border-gray-100 bg-white">
            <form id="task-form" class="flex gap-3">
                <input type="text" id="task-input" placeholder="Escribe una nueva tarea pendiente..."
                    class="w-full px-5 py-3.5 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm font-medium placeholder:text-slate-400"
                    autocomplete="off">
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-6 rounded-xl transition-all flex-shrink-0 shadow-lg shadow-blue-600/20 active:scale-95">
                    Agregar
                </button>
            </form>
            <p id="error-message" class="text-red-500 text-xs mt-3 hidden font-medium flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd" />
                </svg>
                Por favor escribe una tarea válida.
            </p>
        </div>

        <div class="bg-slate-50/50 flex flex-col sm:flex-row divide-y sm:divide-y-0 sm:divide-x divide-gray-100">
            <!-- Columna Tareas Pendientes -->
            <div class="p-8 w-full sm:w-1/2">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                    <h2 class="font-semibold text-slate-700">Pendientes</h2>
                    <span id="pending-count"
                        class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full ml-auto">0</span>
                </div>

                <ul id="pending-list" class="space-y-3 min-h-[150px]">
                    <!-- Tareas pendientes inyectadas por JS -->
                </ul>

                <!-- Empty State Pendientes -->
                <div id="pending-empty" class="text-center py-6 hidden fade-in">
                    <p class="text-slate-400 text-sm font-medium">No hay pendientes</p>
                    <p class="text-slate-300 text-xs mt-0.5">Todo al día 🎉</p>
                </div>
            </div>

            <!-- Columna Tareas Completadas -->
            <div class="p-8 w-full sm:w-1/2 bg-slate-100/30">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    <h2 class="font-semibold text-slate-700">Completadas</h2>
                    <span id="completed-count"
                        class="bg-slate-200 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-full ml-auto">0/5</span>
                </div>

                <ul id="completed-list" class="space-y-3 min-h-[150px]">
                </ul>

                <!-- Empty State Completadas -->
                <div id="completed-empty" class="text-center py-6 hidden fade-in">
                    <p class="text-slate-400 text-sm font-medium">Todavía no completas nada.</p>
                    <p class="text-slate-300 text-xs mt-0.5">Completa una tarea para verla aquí</p>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
