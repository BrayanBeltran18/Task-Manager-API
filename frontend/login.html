<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Manager</title>
    <!-- Tailwind CSS desde CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 text-slate-800">

    <main class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 border border-slate-100 fade-in">

        <!-- Header -->
        <div class="flex flex-col items-center text-center mb-8">
            <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Bienvenido</h1>
            <p class="text-slate-500 text-sm mt-1 font-medium">Inicia sesión para administrar tus tareas.</p>
        </div>

        <!-- Alerta de Error -->
        <div id="error-alert"
            class="hidden mb-4 p-3 rounded-xl bg-red-50 text-red-600 text-sm font-medium border border-red-100 text-center">
            Credenciales inválidas.
        </div>

        <!-- Formulario -->
        <form id="login-form" class="space-y-5">
            <div>
                <label for="usuario" class="block text-sm font-semibold text-slate-700 mb-1">Usuario</label>
                <input type="text" id="usuario" placeholder="Puede ser panchito231999" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all font-medium text-slate-700 placeholder:font-normal placeholder:text-slate-400">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
                <input type="password" id="password" placeholder="La contraseña secreta" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all font-medium text-slate-700 placeholder:font-normal placeholder:text-slate-400">
            </div>

            <button type="submit" id="btn-submit"
                class="w-full py-3 px-4 bg-slate-900 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 hover:-translate-y-0.5 transition-all outline-none focus:ring-4 focus:ring-slate-900/30 flex justify-center items-center">
                <span>Entrar</span>
            </button>
        </form>

    </main>

    <script src="login.js"></script>
</body>

</html>
